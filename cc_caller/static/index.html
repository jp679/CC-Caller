<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>CC-Caller</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/icon.svg">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <div>
      <h1>CC‑Caller</h1>
      <div id="session-label"></div>
    </div>
    <div id="status" class="status idle">disconnected</div>
  </header>
  <main id="captions"></main>
  <footer>
    <div id="sessions" class="hidden"></div>
    <div id="taskbar" class="hidden">Claude working — <span id="elapsed">0s</span><span id="activity"></span></div>
    <div id="textrow" class="hidden">
      <input id="textinput" type="text" placeholder="Type instead of talking…" autocomplete="off">
      <button id="textsend" class="secondary">Send</button>
    </div>
    <div class="row">
      <button id="mute" class="hidden secondary">Mute</button>
      <button id="connect">Connect</button>
    </div>
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
